domain: consulting
version: "1"
description: "Client-facing knowledge work — reports, assessments, strategies, recommendations"

applies_to_work_types:
  - comms
  - research
  - design
  - docs

criticalities:
  low:
    description: "Internal memos, informal recommendations"
    required_checks:
      - artifact_breadth
    thresholds:
      coverage_min: 0.3
      check_pass_ratio: 1.0
    max_iterations: 3

  medium:
    description: "Client deliverables, project reports, strategy documents"
    required_checks:
      - artifact_breadth
      - assumptions_flagged
      - recommendation_traceability
    thresholds:
      coverage_min: 0.5
      check_pass_ratio: 1.0
    max_iterations: 5

  high:
    description: "Board-level recommendations, investment cases, public reports"
    required_checks:
      - artifact_breadth
      - assumptions_flagged
      - unknowns_resolved
      - scope_coverage
      - recommendation_traceability
      - finding_sourced
    thresholds:
      coverage_min: 0.7
      check_pass_ratio: 1.0
    max_iterations: 5

  critical:
    description: "Regulatory filings, legal-adjacent deliverables, audit reports"
    required_checks:
      - artifact_breadth
      - assumptions_flagged
      - unknowns_resolved
      - scope_coverage
      - recommendation_traceability
      - finding_sourced
      - provenance_depth
    thresholds:
      coverage_min: 0.85
      check_pass_ratio: 1.0
    max_iterations: 8

hints_to_ai:
  - "Log every assumption with a confidence score — clients challenge assumptions."
  - "Decisions need documented rationale — 'why this option over alternatives?'"
  - "Unresolved unknowns must be flagged in the deliverable, not hidden."
