domain: cybersec
version: "1"
description: "Security-sensitive code and configuration work"

applies_to_work_types:
  - code
  - infra
  - config

criticalities:
  low:
    description: "Hobby projects, prototypes, internal tools with no PII"
    required_checks:
      - tests
      - lint
    optional_checks: []
    thresholds:
      coverage_min: 0.3
      check_pass_ratio: 1.0
    max_iterations: 3

  medium:
    description: "Production services, internal APIs with authenticated users"
    required_checks:
      - tests
      - lint
      - semgrep_basic
    thresholds:
      coverage_min: 0.5
      check_pass_ratio: 1.0
    max_iterations: 5

  high:
    description: "Public-facing, handles PII or authentication"
    required_checks:
      - tests
      - lint
      - semgrep_full
      - trivy_deps
      - gitleaks
    thresholds:
      coverage_min: 0.7
      check_pass_ratio: 1.0
    max_iterations: 5

  critical:
    description: "Financial, medical, regulated (GDPR, HIPAA, PCI, SOX, AI Act)"
    required_checks:
      - tests
      - lint
      - semgrep_full
      - trivy_deps
      - gitleaks
      - sbom_audit
      - threat_model_current
      - privilege_review
    thresholds:
      coverage_min: 0.85
      check_pass_ratio: 1.0
    max_iterations: 8

hints_to_ai:
  - "Log assumptions about trust boundaries explicitly."
  - "Every untrusted input must have an assumption about its source."
